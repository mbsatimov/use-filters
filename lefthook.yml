pre-commit:
  parallel: false
  commands:
    lint:
      priority: 1
      glob: '*.{ts,tsx,js,jsx,mjs,cjs}'
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true
    format:
      priority: 2
      glob: '*.{ts,tsx,js,jsx,mjs,cjs,json,md,mdx,yml,yaml}'
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: false
  commands:
    typecheck:
      run: pnpm typecheck
    test:
      run: pnpm test
