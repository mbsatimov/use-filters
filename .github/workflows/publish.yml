name: Publish package

# Publishes to the public npm registry on every GitHub Release. Bump "version"
# in package.json first, then cut a release (tag it e.g. v0.2.0) — this workflow
# builds and publishes that version automatically.
#
# Requires an `NPM_TOKEN` repository secret: an npm automation token with
# publish rights to the @mbsatimov scope.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          scope: '@mbsatimov'

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
