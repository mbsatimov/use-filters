name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm build
      # Validate that the published types resolve under every module system
      # (node10 / node16 CJS / node16 ESM / bundler) — guards the exports map.
      - run: pnpm check:exports
      # Defend the "lightweight" claim: fails if dist exceeds the size budget.
      - run: pnpm size

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Guard the supported peer range: React 18 & 19 against nuqs 2.x.
        react: ['18', '19']
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @mbsatimov/use-filters add -D react@${{ matrix.react }} react-dom@${{ matrix.react }}
      - run: pnpm typecheck
      - run: pnpm test
