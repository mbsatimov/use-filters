name: Release

# Versioning and publishing via Changesets:
# - On push to main with pending changesets (files in .changeset/), opens or
#   updates a "Version Packages" PR that bumps package.json and rewrites
#   CHANGELOG.md.
# - Merging that PR re-triggers this workflow; with no pending changesets
#   left, it publishes the new version to npm instead (prepublishOnly runs
#   typecheck/test/build first) and tags the release.
#
# Requires an `NPM_TOKEN` repository secret: an npm automation token with
# publish rights to the @mbsatimov scope.
on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          scope: '@mbsatimov'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
